name: career-jarvis

# Runs a single poll cycle (`python -m src.main --once`) on a schedule.
# This is the recommended free, always-on deployment for a personal app.
# See README.md "Deployment -> GitHub Actions cron" for full setup.
#
# You MUST first do these one-time steps (documented in the README):
#   1. Generate the OAuth token locally with `python -m src.main --once`
#      (a browser opens once; the token caches at .data/token.json).
#   2. Add these repository Secrets (Settings -> Secrets and variables ->
#      Actions -> New repository secret):
#        ANTHROPIC_API_KEY          your Anthropic API key
#        NTFY_TOPIC                 your secret ntfy topic
#        GMAIL_CREDENTIALS_JSON     full contents of your local
#                                   .data/credentials.json (one line is fine)
#        GMAIL_TOKEN_JSON           full contents of your local
#                                   .data/token.json (the cached OAuth token)
#        CLASSIFIER_MODEL           e.g. claude-haiku-4-5-20251001
#        DRAFTER_MODEL              e.g. claude-sonnet-4-5-20250929
#   3. (Optional) NTFY_BASE_URL if you self-host ntfy; NTFY_TOKEN for
#      protected topics.
#
# The SQLite state DB (.data/career_jarvis.db) is cached between runs via
# actions/cache so dedup + the Gmail historyId cursor persist across the
# ephemeral runner. The cache key is fixed so every run reuses the same slot.

on:
  schedule:
    # Every 15 minutes. GitHub Actions cron is "best effort" and can lag by a
    # few minutes during peak load; that's fine for this use case.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # manual "Run workflow" button in the Actions UI

# Prevent overlapping runs: if a new run starts while one is in flight, cancel
# the older one. Avoids double-processing / duplicate drafts on slow runs.
concurrency:
  group: career-jarvis-cycle
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state DB cache
        uses: actions/cache@v4
        with:
          path: .data
          # Fixed key so every run reuses the SAME cache slot -> the SQLite
          # dedup table and historyId cursor persist across runs. The cache
          # is updated automatically at job end with any DB changes.
          key: career-jarvis-state-db
          # Allow restore even when an exact-key match doesn't exist yet.
          restore-keys: |
            career-jarvis-state-db

      - name: Write OAuth credentials + token from secrets
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          mkdir -p .data
          # printf '%s' avoids a trailing newline that would corrupt the JSON.
          printf '%s' "$GMAIL_CREDENTIALS_JSON" > .data/credentials.json
          printf '%s' "$GMAIL_TOKEN_JSON"      > .data/token.json
          # Tighten permissions (the app also does this, but be explicit here
          # since the runner filesystem is shared while the job runs).
          chmod 600 .data/credentials.json .data/token.json
          # Quick sanity check that the JSON is valid.
          python -c "import json,sys; json.load(open('.data/credentials.json')); json.load(open('.data/token.json')); print('credentials + token JSON OK')"

      - name: Run one poll cycle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLASSIFIER_MODEL: ${{ secrets.CLASSIFIER_MODEL }}
          DRAFTER_MODEL: ${{ secrets.DRAFTER_MODEL }}
          NOTIFY_CHANNEL: ntfy
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_BASE_URL: ${{ secrets.NTFY_BASE_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          GMAIL_CREDENTIALS_JSON: .data/credentials.json
          TOKEN_PATH: .data/token.json
          STATE_DB_PATH: .data/career_jarvis.db
          # No browser is available in CI; if the token ever expires and a
          # refresh fails, the run will fail loudly with a clear message
          # rather than hang. Re-run `--once` locally to refresh the token
          # and update the GMAIL_TOKEN_JSON secret.
          PYTHONUNBUFFERED: "1"
        run: python -m src.main --once
